<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>E8 — an interactive paper</title>
<meta name="description" content="Interactive scientific papers you can steer: the E8 root system, a 24-cell, a molecule, a star catalog." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2307080c'/%3E%3Cg fill='%237fb2ff'%3E%3Ccircle cx='16' cy='6.5' r='2.2'/%3E%3Ccircle cx='22.7' cy='9.3' r='2.2'/%3E%3Ccircle cx='25.5' cy='16' r='2.2'/%3E%3Ccircle cx='22.7' cy='22.7' r='2.2'/%3E%3Ccircle cx='16' cy='25.5' r='2.2'/%3E%3Ccircle cx='9.3' cy='22.7' r='2.2'/%3E%3Ccircle cx='6.5' cy='16' r='2.2'/%3E%3Ccircle cx='9.3' cy='9.3' r='2.2'/%3E%3C/g%3E%3Ccircle cx='16' cy='16' r='2.6' fill='%23f0e2aa'/%3E%3C/svg%3E" />
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; overscroll-behavior: none; }
  canvas { display: block; width: 100vw; height: 100vh; touch-action: none; outline: none; }
  #err { position: fixed; inset: 0; display: none; place-content: center; color: #f78; font: 14px monospace; padding: 2rem; white-space: pre-wrap; }
  #load { position: fixed; inset: 0; display: grid; place-content: center; color: #8fa3c4; font: 15px system-ui, sans-serif; }

  /* The way in, for someone who arrived from a link: it goes on the first
     interaction, because after that the guide strip the app draws says it all.
     It floats ABOVE that strip — the app paints its own key line along the very
     bottom of the canvas, and the two must not overlap. */
  #hint {
    position: fixed; left: 50%; bottom: calc(72px + env(safe-area-inset-bottom)); transform: translateX(-50%);
    color: #c6d0e0; background: rgba(10,12,20,.66); border: 1px solid rgba(120,140,180,.28);
    border-radius: 16px; padding: 9px 18px; font: 14px/1.4 system-ui, sans-serif;
    pointer-events: none; transition: opacity .6s ease; z-index: 3; text-align: center; max-width: 88vw;
  }
  #hint b { color: #f0e2aa; font-weight: 600; }

  /* The bar exists only where there is no keyboard. Every key the demo needs — the
     journey, the shortcuts, fullscreen — is a key, and a phone has none of them; a
     touch user without this bar can orbit the figure and nothing else. */
  #touchbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 4; display: none;
    justify-content: center; gap: 8px; padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(0,0,0,.72), rgba(0,0,0,0));
  }
  #touchbar button {
    flex: 0 0 auto; min-width: 52px; min-height: 44px;   /* 44px: the smallest target a thumb hits reliably */
    color: #dbe6f7; background: rgba(22,26,38,.86); border: 1px solid rgba(120,140,180,.30);
    border-radius: 12px; font: 15px/1 system-ui, sans-serif; padding: 0 14px;
  }
  #touchbar button:active { background: rgba(60,70,96,.9); }
  #touchbar .wide { font-weight: 600; color: #f0e2aa; }
  body.touch #touchbar { display: flex; }
  body.touch #hint { bottom: calc(74px + env(safe-area-inset-bottom)); }

  /* Home, edit, and the sources. Quiet, in the top-right corner — the top-LEFT
     belongs to the app's own status line, and nothing of ours may sit on it. */
  #top {
    position: fixed; left: 14px; right: 14px; top: calc(10px + env(safe-area-inset-top)); z-index: 3;
    display: flex; justify-content: flex-end; gap: 16px; align-items: center; pointer-events: none;
    font: 13px/1.5 system-ui, sans-serif; color: #8792a6;
  }
  #top a { pointer-events: auto; color: #9fb4d8; text-decoration: none; border-bottom: 1px solid rgba(159,180,216,.28); }
  #top a:hover { color: #dbe6f7; border-bottom-color: #dbe6f7; }
  #top .home { border: 1px solid rgba(120,140,180,.30); border-bottom-color: rgba(120,140,180,.30);
               background: rgba(10,12,20,.6); border-radius: 10px; padding: 7px 12px; }
  #src { display: flex; gap: 14px; align-items: center; }
  /* The same drawer the touchbar's Edit opens — a mouse deserves a button too, not
     just the O key. Hidden on touch, where the bar already carries it. */
  #t-edit { pointer-events: auto; cursor: pointer; color: #9fb4d8; font: 13px/1.5 system-ui, sans-serif;
            background: rgba(10,12,20,.6); border: 1px solid rgba(120,140,180,.30);
            border-radius: 10px; padding: 7px 12px; }
  #t-edit:hover { color: #dbe6f7; border-color: rgba(159,180,216,.6); }
  body.touch #t-edit { display: none; }
  body.editing #t-edit { color: #f0e2aa; border-color: rgba(240,226,170,.5); }

  /* The drop target only appears while something is over the page — a dashed rectangle
     sitting there permanently would be furniture in front of the figure. */
  #drop {
    position: fixed; inset: 12px; z-index: 6; display: none; place-content: center;
    border: 2px dashed rgba(160,190,240,.65); border-radius: 18px;
    background: rgba(8,12,22,.72); color: #dbe6f7; font: 17px system-ui, sans-serif;
  }
  body.dragging #drop { display: grid; }
  #toast {
    position: fixed; left: 50%; top: calc(58px + env(safe-area-inset-top)); transform: translateX(-50%);
    z-index: 6; display: none; max-width: 90vw; padding: 10px 16px; border-radius: 12px;
    font: 14px/1.45 system-ui, sans-serif; text-align: center;
    background: rgba(12,16,26,.92); border: 1px solid rgba(120,140,180,.35); color: #dbe6f7;
  }
  #toast.bad { border-color: rgba(240,120,120,.5); color: #ffc4c4; }
  #toast.show { display: block; }
  #b-open { display: none; }
  body.opens #b-open { display: block; }
  @media (max-width: 640px) { #src { display: none; } }   /* a phone has no room for footnotes */

  /* The editor. A drawer over the scene, not a second window — a tab has only the one,
     and on a phone the scene BEHIND the drawer is the live preview. Real inputs, so the
     phone keyboard is the phone's own, and the fields are the deck's fields. */
  #editor {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 7; width: min(420px, 100vw);
    transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
    background: rgba(9,11,17,.97); border-left: 1px solid rgba(120,140,180,.25);
    display: flex; flex-direction: column; color: #dbe6f7; font: 14px/1.5 system-ui, sans-serif;
  }
  body.editing #editor { transform: translateX(0); box-shadow: -30px 0 60px rgba(0,0,0,.5); }
  /* On a phone the drawer is the whole screen, and the scene peeks through a strip on top. */
  @media (max-width: 520px) { #editor { width: 100vw; } }

  #ed-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px calc(12px + env(safe-area-inset-top));
             padding-top: calc(12px + env(safe-area-inset-top)); border-bottom: 1px solid rgba(120,140,180,.18); }
  #ed-head b { font-weight: 650; font-size: 15px; }
  #ed-head .sp { flex: 1; }
  #ed-head button { min-height: 38px; padding: 0 12px; border-radius: 9px; font: 14px system-ui; color: #dbe6f7;
                    background: rgba(30,36,52,.9); border: 1px solid rgba(120,140,180,.3); }
  #ed-head button.primary { color: #0a0c12; background: #9fc0f0; border-color: #9fc0f0; font-weight: 600; }
  #ed-head button:active { filter: brightness(1.2); }

  /* The slide strip: one chip per slide, plus a + to add. Tap selects; the scene and
     the fields follow. */
  #ed-tabs { display: flex; gap: 6px; overflow-x: auto; padding: 10px 14px; border-bottom: 1px solid rgba(120,140,180,.14); }
  #ed-tabs button { flex: 0 0 auto; min-width: 34px; min-height: 34px; border-radius: 8px; font: 13px system-ui;
                    color: #b9c6dc; background: rgba(28,34,48,.8); border: 1px solid rgba(120,140,180,.22); }
  #ed-tabs button.on { color: #0a0c12; background: #f0e2aa; border-color: #f0e2aa; font-weight: 600; }
  #ed-tabs button.add { color: #9fc0f0; }

  #ed-body { flex: 1; overflow-y: auto; padding: 12px 14px 40px; -webkit-overflow-scrolling: touch; }
  #ed-body label { display: block; margin: 12px 0 4px; font-size: 12px; letter-spacing: .04em; color: #93a1ba; text-transform: uppercase; }
  #ed-body input[type=text], #ed-body textarea, #ed-body select, #ed-body input[type=number] {
    width: 100%; box-sizing: border-box; padding: 9px 10px; border-radius: 9px; font: 14px/1.45 system-ui;
    color: #eaf0f8; background: rgba(20,24,34,.9); border: 1px solid rgba(120,140,180,.28);
  }
  #ed-body textarea { min-height: 92px; resize: vertical; }
  #ed-body input:focus, #ed-body textarea:focus, #ed-body select:focus { outline: none; border-color: #9fc0f0; }
  .ed-row { display: flex; gap: 10px; }
  .ed-row > div { flex: 1; }
  .ed-check { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  .ed-check input { width: 20px; height: 20px; }
  .ed-check label { margin: 0; text-transform: none; letter-spacing: 0; font-size: 14px; color: #dbe6f7; }
  .ed-cam { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
  .ed-cam button { min-height: 34px; padding: 0 11px; border-radius: 8px; font: 13px system-ui; color: #dbe6f7;
                   background: rgba(30,36,52,.9); border: 1px solid rgba(120,140,180,.3); }
  .ed-cam .val { font: 12px ui-monospace, monospace; color: #93a1ba; }
  .ed-cam button:disabled { opacity: .35; }
  #ed-del { margin-top: 22px; width: 100%; min-height: 40px; border-radius: 9px; font: 14px system-ui; color: #ffb4b4;
            background: rgba(50,20,24,.6); border: 1px solid rgba(200,90,90,.35); }
  .ed-ghost { margin-top: 10px; width: 100%; min-height: 36px; border-radius: 9px; font: 13px system-ui;
              color: #93a1ba; background: transparent; border: 1px dashed rgba(120,140,180,.3); }
  #ed-note { padding: 8px 14px; font-size: 13px; color: #f0c674; min-height: 20px; }
  #ed-note.bad { color: #ff9d9d; }
  body.editing #b-edit { background: rgba(60,70,96,.9); }
</style>
</head>
<body>
<canvas id="c" tabindex="0"></canvas>
<div id="top">
  <span id="src">
    <a href="https://github.com/postadelmaga/E8" target="_blank" rel="noopener">E8</a>
    <a href="https://github.com/postadelmaga/Zengine" target="_blank" rel="noopener">Zengine</a>
    <a href="https://github.com/postadelmaga/Zrame" target="_blank" rel="noopener">Zrame</a>
  </span>
  <button id="t-edit" title="Edit the deck (O)">Edit</button>
  <a class="home" href="./">‹ All demos</a>
</div>
<div id="load">loading…</div>
<div id="hint"></div>
<div id="touchbar">
  <button id="b-prev" aria-label="Previous slide">‹</button>
  <button id="b-next" class="wide" aria-label="Next slide">Next ›</button>
  <button id="b-open" aria-label="Open a file">Open…</button>
  <button id="b-edit" aria-label="Edit the deck">Edit</button>
  <button id="b-help" aria-label="Shortcuts">?</button>
  <button id="b-full" aria-label="Fullscreen">⤢</button>
</div>
<div id="err"></div>
<div id="drop">Drop it — this demo will read it</div>
<div id="toast"></div>
<input id="file" type="file" hidden />

<!-- The editor drawer. Populated once the wasm is up (it needs the domain's option
     tables and the live deck). The scene behind it stays live — it is the preview. -->
<aside id="editor" aria-hidden="true">
  <div id="ed-head">
    <b>Deck editor</b><span class="sp"></span>
    <button id="ed-save" class="primary">Save</button>
    <button id="ed-close">Done</button>
  </div>
  <div id="ed-tabs"></div>
  <div id="ed-body"></div>
  <div id="ed-note"></div>
</aside>

<script type="module">
// The interactive paper, in a tab. The wasm module IS the app — the same domain,
// plugins and software rasterizer the native build runs (src/web.zig). This harness
// instantiates ONE demo (the domain is a comptime seam: one module per demo), drives
// rAF, blits the RGBA buffer, and turns DOM events into the ABI the app already has.
const DEMOS = ["lisi","mtheory","polytope","molecule","chem","astro","graph","data","embed"];
// The five profiles open a file you bring. They ship a real sample so the page is never
// empty (src/demos/SAMPLES.md) — but the sample is the invitation, not the point.
const OPENS = {
  chem:  { accept: ".pdb,.ent,.xyz",             what: "a structure (PDB or XYZ)" },
  astro: { accept: ".csv,.tsv,.txt",             what: "a star catalog (CSV: ra, dec, dist or parallax…)" },
  graph: { accept: ".csv,.txt,.edges,.graphml",  what: "an edge list or GraphML" },
  data:  { accept: ".csv,.tsv,.txt",             what: "any CSV" },
  embed: { accept: ".csv,.tsv,.npy",             what: "vectors (CSV or .npy)" },
};
const params = new URLSearchParams(location.search);
const asked = params.get("d");
// A demo we do not carry must SAY so. Falling back to the default silently is how the
// star catalog came up as E8 — the worst possible answer, because it looks like one.
if (asked && !DEMOS.includes(asked)) {
  document.getElementById("load").style.display = "none";
  document.getElementById("err").style.display = "grid";
  document.getElementById("err").textContent =
    `"${asked}" is not in the browser yet — it is a profile that opens a file you bring, and this page cannot hand it one. Go back and pick another.`;
  throw new Error("demo not on the web: " + asked);
}
const demo = asked || "lisi";

// The tab is named after the paper, not the framework — nine of these open side by
// side while comparing, and "E8 — an interactive paper" nine times names none of them.
const TITLES = { lisi: "E8 — Lisi's atlas", mtheory: "E10 — beyond E8", polytope: "The 24-cell",
                 molecule: "Caffeine", chem: "Structure", astro: "Star catalog",
                 graph: "Network", data: "Dataset", embed: "Embeddings" };
document.title = `${TITLES[demo]} — an interactive paper`;

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d", { alpha: false });
const errEl = document.getElementById("err");
const loadEl = document.getElementById("load");
loadEl.textContent = `loading ${TITLES[demo]}…`;
const hint = document.getElementById("hint");
const fail = (m) => { loadEl.style.display = "none"; errEl.style.display = "grid"; errEl.textContent = "E8 web error:\n" + m; };

// A finger is not a mouse: no hover, no keyboard, and a screen a third the size.
const TOUCH = matchMedia("(pointer: coarse)").matches;
document.body.classList.toggle("touch", TOUCH);
hint.innerHTML = TOUCH
  ? "<b>Tap</b> to turn the page · drag to orbit · pinch to zoom · tap a point to inspect it"
  : "Press <b>P</b> to start the paper · <b>H</b> for every key · drag to orbit, click a point";

let x, mem;
try {
  // Streaming first; if the server mislabels the MIME type (a plain file server
  // often does), fall back to the buffered path instead of failing the page.
  const url = `wasm/e8-${demo}.wasm`;
  let instance;
  try {
    ({ instance } = await WebAssembly.instantiateStreaming(fetch(url), { env: {} }));
  } catch {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`${url}: HTTP ${r.status}`);
    ({ instance } = await WebAssembly.instantiate(await r.arrayBuffer(), { env: {} }));
  }
  x = instance.exports; mem = x.memory;
  x.zicroBoot();
  loadEl.style.display = "none";
} catch (e) { fail(String(e)); throw e; }

// --- the frame buffer -------------------------------------------------------------
// The figure is rasterized on the CPU, so every physical pixel is one this thread
// paints. A phone reporting devicePixelRatio 3 would ask for ~7 M of them per frame
// and get a slideshow; capping the ratio costs a little sharpness and buys the
// interaction back. Desktops, which have the cores to spare, keep 2.
//
// This caps the WHOLE canvas — HUD included — and so it can only be a coarse ceiling,
// not the lever for frame rate. Scaling the whole buffer to chase frames was tried and
// removed: the HUD is drawn at fixed pixel sizes, so a smaller buffer does not merely
// soften the status line, it runs the text off the edge. The frame-rate lever is the
// SCENE ALONE, scaled inside the wasm and upscaled on the blit while the HUD stays at
// full resolution — see zicroSceneScale and the governor below. Measured on the E8
// atlas, that is 1.43× the frames at 0.7 scale for a modest softening of the figure,
// and the pick stays exact (the wasm scales the click to match). It is worth doing
// because the frame is single-threaded here (native render_cpu bands across a pool),
// and per-pixel bound: a 24-point scene costs nearly what a 240-point, 6720-edge one
// does, so fewer scene pixels is close to a linear win.
const DPR_MAX = TOUCH ? 1.5 : 2;
let dpr = 1;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, DPR_MAX);
  const cssW = Math.max(1, window.innerWidth | 0), cssH = Math.max(1, window.innerHeight | 0);
  x.zicroResize(Math.round(cssW * dpr), Math.round(cssH * dpr), dpr);
  canvas.width = x.zicroWidth();
  canvas.height = x.zicroHeight();
}
addEventListener("resize", resize);
addEventListener("orientationchange", () => setTimeout(resize, 120));
resize();
canvas.focus();

let touched = false;
const used = () => { if (!touched) { touched = true; hint.style.opacity = "0"; } };

// --- keys (evdev codes: the table the native build binds, src/keys.zig) -----------
const EVDEV = {
  KeyA:30,KeyB:48,KeyC:46,KeyD:32,KeyE:18,KeyF:33,KeyG:34,KeyH:35,KeyI:23,KeyJ:36,KeyK:37,KeyL:38,KeyM:50,
  KeyN:49,KeyO:24,KeyP:25,KeyQ:16,KeyR:19,KeyS:31,KeyT:20,KeyU:22,KeyV:47,KeyW:17,KeyX:45,KeyY:21,KeyZ:44,
  Digit1:2,Digit2:3,Digit3:4,Digit4:5,Digit5:6,Digit6:7,Digit7:8,Digit8:9,Digit9:10,Digit0:11,
  Space:57,Minus:12,Equal:13,Comma:51,Period:52,Slash:53,Semicolon:39,Quote:40,
  BracketLeft:26,BracketRight:27,Backslash:43,Backquote:41,
  Backspace:14,Tab:15,Enter:28,Escape:1,Delete:111,Home:102,End:107,
  ArrowLeft:105,ArrowRight:106,ArrowUp:103,ArrowDown:108,
  ShiftLeft:42,ShiftRight:54,
};
const KEY = { next: 25 /*P*/, prev: 14 /*Backspace*/, help: 35 /*H*/, full: 33 /*F*/ };
const press = (code) => { used(); x.zicroKey(code, 1); x.zicroKey(code, 0); };

canvas.addEventListener("keydown", (e) => {
  // O opens the editor natively; here the native editor is compiled out
  // (`native_only`), so the same key opens the page's own drawer instead.
  if (e.code === "KeyO" && !e.repeat) { e.preventDefault(); used(); toggleEditor(); return; }
  const code = EVDEV[e.code];
  if (code === undefined) return;
  if (e.code !== "F5" && e.code !== "F12") e.preventDefault();
  used();
  x.zicroKey(code, 1);
});
// Esc, layered, like the native build: the drawer first — wherever focus is —
// and only then the app's own layers (card, panel).
addEventListener("keydown", (e) => {
  if (e.code === "Escape" && document.body.classList.contains("editing")) {
    e.preventDefault(); e.stopPropagation(); closeEditor();
  }
}, true);
canvas.addEventListener("keyup", (e) => {
  const code = EVDEV[e.code];
  if (code !== undefined) x.zicroKey(code, 0);
});

// --- pointer and gesture ----------------------------------------------------------
// One code path for mouse, pen and finger — that is what pointer events are for. What
// differs is what the gestures MEAN, and only two are ambiguous:
//
//   · a tap. On a phone it is the page-turn (there is no P key to press) — but a tap
//     ON a point must still inspect it. The browser cannot tell those apart: it knows
//     where the finger landed, not what is under it. So it forwards the tap to the app
//     (zicroTap), which picks first and turns the page only if nothing was hit.
//   · two fingers. A pinch is a zoom, and must not be mistaken for two drags.
const pts = new Map();              // live pointers, by id
let pinchDist = 0;
let down = null;                    // {x, y, t, moved} for the single-pointer gesture

// Derived from the canvas, not from `dpr`: the render scale moves under us, and a
// pick that used a stale ratio would land on the wrong root — silently, which is
// the worst way for a pick to be wrong.
const pos = (e) => {
  const r = canvas.getBoundingClientRect();
  const sx = canvas.width / (r.width || 1), sy = canvas.height / (r.height || 1);
  return [(e.clientX - r.left) * sx, (e.clientY - r.top) * sy];
};
const dist = () => {
  const [a, b] = [...pts.values()];
  return Math.hypot(a[0] - b[0], a[1] - b[1]);
};

canvas.addEventListener("pointerdown", (e) => {
  used(); canvas.setPointerCapture(e.pointerId); canvas.focus();
  const p = pos(e);
  pts.set(e.pointerId, p);
  if (pts.size === 2) {                    // a second finger ends the drag and starts a pinch
    pinchDist = dist();
    x.zicroPointerButton(272, 0);
    down = null;
    return;
  }
  down = { x: p[0], y: p[1], t: performance.now(), moved: 0 };
  x.zicroPointerMove(p[0], p[1]);
  x.zicroPointerButton(272, 1);            // BTN_LEFT: the app orbits while it is held
});

canvas.addEventListener("pointermove", (e) => {
  const p = pos(e);
  const prev = pts.get(e.pointerId);
  if (prev) pts.set(e.pointerId, p);

  if (pts.size === 2) {
    const d = dist();
    if (pinchDist > 0 && Math.abs(d - pinchDist) > 1) {
      // Pinch → the same wheel the app already understands. The sign matches a
      // trackpad: fingers apart = closer to the figure.
      x.zicroScroll((d - pinchDist) * 3);
      pinchDist = d;
    }
    return;
  }
  if (down) down.moved += Math.abs(p[0] - down.x) + Math.abs(p[1] - down.y);
  x.zicroPointerMove(p[0], p[1]);
});

function endPointer(e) {
  const p = pos(e);
  pts.delete(e.pointerId);
  if (pts.size < 2) pinchDist = 0;

  if (down) {
    const dt = performance.now() - down.t;
    const dx = p[0] - down.x, dy = p[1] - down.y;
    const travel = Math.hypot(dx, dy);
    const tap = travel < 10 * dpr && dt < 350;
    const swipe = TOUCH && dt < 500 && Math.abs(dx) > 60 * dpr && Math.abs(dx) > 2 * Math.abs(dy);

    x.zicroPointerMove(p[0], p[1]);
    x.zicroPointerButton(272, 0);          // release first: the orbit ends here either way

    if (swipe) press(dx < 0 ? KEY.next : KEY.prev);   // the page-turn everyone tries first
    else if (tap && TOUCH) x.zicroTap(p[0], p[1]);    // a point, or the page
    down = null;
    return;
  }
  x.zicroPointerButton(272, 0);
}
canvas.addEventListener("pointerup", endPointer);
canvas.addEventListener("pointercancel", endPointer);

canvas.addEventListener("wheel", (e) => { e.preventDefault(); used(); x.zicroScroll(-e.deltaY * dpr); }, { passive: false });
canvas.addEventListener("contextmenu", (e) => e.preventDefault());
canvas.addEventListener("dblclick", (e) => e.preventDefault());

document.getElementById("b-next").onclick = () => press(KEY.next);
document.getElementById("b-prev").onclick = () => press(KEY.prev);
document.getElementById("b-help").onclick = () => press(KEY.help);
document.getElementById("b-full").onclick = () => {
  // The app's own F toggles a Wayland fullscreen it does not have here; in a tab the
  // page owns the screen, so the page asks for it.
  if (document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen?.().catch(() => {});
};

// --- the file the visitor brings ---------------------------------------------------
// Same path for a drop (desktop) and a pick (phone): read the bytes, hand them to the
// wasm, and let the APP decide whether they are a structure. If they are not, it puts
// the sample back and says so — a viewer that silently shows something else is worse
// than one that says no.
const opens = OPENS[demo];
if (opens) {
  document.body.classList.add("opens");
  document.getElementById("file").accept = opens.accept;
  document.getElementById("drop").textContent = `Drop ${opens.what}`;
}

const toast = document.getElementById("toast");
let toastT = 0;
function say(msg, bad) {
  toast.textContent = msg;
  toast.className = "show" + (bad ? " bad" : "");
  clearTimeout(toastT);
  toastT = setTimeout(() => { toast.className = ""; }, 4200);
}

// The name and the bytes each need a buffer, and one call lends one buffer — so the name
// goes over FIRST, into that scratch, and the module copies it into a home of its own
// before the next call hands the scratch to the file itself.
async function openFile(file) {
  const bytes = new Uint8Array(await file.arrayBuffer());
  const nameBytes = new TextEncoder().encode(file.name);

  const nptr = x.zicroFileBuffer(nameBytes.length);
  if (!nptr) { say("out of memory", true); return; }
  new Uint8Array(mem.buffer, nptr, nameBytes.length).set(nameBytes);
  x.zicroFileName(nptr, nameBytes.length);

  const ptr = x.zicroFileBuffer(bytes.length);            // this frees the name scratch
  if (!ptr) { say("that file is too big for this tab", true); return; }
  new Uint8Array(mem.buffer, ptr, bytes.length).set(bytes);

  const bad = x.zicroOpenFile();
  if (bad) say(`${file.name} would not load — the sample is back`, true);
  else say(`opened ${file.name}`);
  used();
}

if (opens) {
  const fileEl = document.getElementById("file");
  document.getElementById("b-open").onclick = () => fileEl.click();
  fileEl.onchange = () => { if (fileEl.files[0]) openFile(fileEl.files[0]); fileEl.value = ""; };

  addEventListener("dragover", (e) => { e.preventDefault(); document.body.classList.add("dragging"); });
  addEventListener("dragleave", (e) => { if (e.relatedTarget === null) document.body.classList.remove("dragging"); });
  addEventListener("drop", (e) => {
    e.preventDefault();
    document.body.classList.remove("dragging");
    const f = e.dataTransfer?.files?.[0];
    if (f) openFile(f);
  });
}

// --- the editor ---------------------------------------------------------------------
// The wasm owns the truth: it hands over the live deck as ZON and the domain's own
// option tables, it takes a deck back as ZON and previews it (the F5 path, so the
// preview cannot drift from the real render), and it reads the live camera. The page
// owns the FORM: real inputs, the phone's own keyboard, and a model that serializes to
// exactly the ZON `deck_write.zig` produces — so a deck saved here reloads natively.

const strAt = (ptr, len) => new TextDecoder().decode(new Uint8Array(mem.buffer, ptr, len));
const OPTS = JSON.parse(strAt(x.zicroOptions(), x.zicroOptionsLen()));
const LS_KEY = "e8-deck-" + demo;

// ZON string escaping — the same set deck_write.zig's escapeBody writes.
function zescape(s) {
  let o = "";
  for (const ch of s) {
    const c = ch.codePointAt(0);
    if (ch === '"') o += '\\"';
    else if (ch === "\\") o += "\\\\";
    else if (ch === "\n") o += "\\n";
    else if (ch === "\r") o += "\\r";
    else if (ch === "\t") o += "\\t";
    else if (c < 0x20 || c === 0x7f) o += "\\x" + c.toString(16).padStart(2, "0");
    else o += ch;
  }
  return o;
}
function zunescape(s) {
  return s.replace(/\\x([0-9a-fA-F]{2})|\\(.)/g, (_, hex, ch) => {
    if (hex) return String.fromCharCode(parseInt(hex, 16));
    return { n: "\n", r: "\r", t: "\t", '"': '"', "\\": "\\" }[ch] ?? ch;
  });
}

// A parser for exactly the ZON `toStringAlloc` emits — regular `.field = value,` lines,
// one slide per `.{ … },`. Not a general ZON parser; it does not need to be.
function parseDeck(zon) {
  const slides = [];
  // strip the leading comment block and outer wrapper by working slide by slide
  const slideRe = /\.\{\s*([\s\S]*?)\n\s*\},/g;
  // the OUTER `.{ .slides = .{ … } }` also matches; skip any block with no `.title`
  let m;
  while ((m = slideRe.exec(zon))) {
    const block = m[1];
    if (!/\.title\s*=/.test(block)) continue;
    const s = blankSlide();
    const strField = (name) => {
      const r = new RegExp("\\." + name + '\\s*=\\s*"((?:[^"\\\\]|\\\\.)*)"');
      const mm = r.exec(block);
      return mm ? zunescape(mm[1]) : null;
    };
    for (const f of ["title", "body", "cite", "image", "data", "preset", "color", "edge", "filter", "fig"]) {
      const v = strField(f);
      if (v !== null) s[f] = v;
    }
    const dwell = /\.dwell\s*=\s*([\d.]+)/.exec(block);
    if (dwell) s.dwell = parseFloat(dwell[1]);
    s.tumble = /\.tumble\s*=\s*true/.test(block);
    const cam = /\.cam\s*=\s*\.\{\s*([-\d.]+)\s*,\s*([-\d.]+)\s*,\s*([-\d.]+)/.exec(block);
    if (cam) s.cam = [parseFloat(cam[1]), parseFloat(cam[2]), parseFloat(cam[3])];
    slides.push(s);
  }
  return slides;
}

function blankSlide() {
  return { title: "", body: "", cite: "", image: "", data: "", preset: OPTS.presets[0] || "",
           color: "", edge: "all", filter: "", fig: "", tumble: false, dwell: 22, cam: null };
}

// Model → ZON, matching deck_write.zig field for field (optional fields omitted when
// empty / at their default, so the round trip is stable).
function serializeDeck(slides) {
  let o = "// Authored in the E8 web editor.\n.{\n    .slides = .{\n";
  for (const s of slides) {
    o += "        .{\n";
    o += `            .title = "${zescape(s.title)}",\n`;
    o += `            .body = "${zescape(s.body)}",\n`;
    if (s.cite) o += `            .cite = "${zescape(s.cite)}",\n`;
    if (s.image) o += `            .image = "${zescape(s.image)}",\n`;
    if (s.data) o += `            .data = "${zescape(s.data)}",\n`;
    o += `            .preset = "${zescape(s.preset)}",\n`;
    if (s.color && s.color !== "—") o += `            .color = "${zescape(s.color)}",\n`;
    if (s.edge && s.edge !== "all") o += `            .edge = "${zescape(s.edge)}",\n`;
    if (s.filter && s.filter !== "—") o += `            .filter = "${zescape(s.filter)}",\n`;
    if (s.fig) o += `            .fig = "${zescape(s.fig)}",\n`;
    if (s.cam) o += `            .cam = .{ ${s.cam[0].toFixed(4)}, ${s.cam[1].toFixed(4)}, ${s.cam[2].toFixed(4)} },\n`;
    if (s.tumble) o += `            .tumble = true,\n`;
    if (s.dwell !== 22) o += `            .dwell = ${s.dwell},\n`;
    o += "        },\n";
  }
  o += "    },\n}\n";
  return o;
}

// Push the model to the wasm and preview slide `sel`. Returns true if it parsed.
function preview(sel) {
  const zon = serializeDeck(edModel);
  const bytes = new TextEncoder().encode(zon);
  const ptr = x.zicroDeckBuffer(bytes.length);
  if (!ptr) return false;
  new Uint8Array(mem.buffer, ptr, bytes.length).set(bytes);
  return x.zicroApplyDeck(sel) === 0;
}

let edModel = [];
let edSel = 0;
let edPrevT = 0;

// The hidden picker the "Choose image…" button drives. Decoding happens here: the
// browser turns any PNG/JPG/WebP into pixels, we hand the RGBA to the wasm under the
// file's name, set the slide to name it, and preview. The decoded images also need to
// be re-registered when a saved draft is reopened — the wasm forgot them on reload —
// so JS keeps them, as data URLs, in the draft's own store (see edImages).
const imgInput = document.createElement("input");
imgInput.type = "file"; imgInput.accept = "image/*"; imgInput.hidden = true;
document.body.appendChild(imgInput);
const edImages = {};   // name → dataURL, so a reopened draft can re-register them

async function registerImage(name, blobOrDataURL) {
  const bmp = await createImageBitmap(typeof blobOrDataURL === "string" ? await (await fetch(blobOrDataURL)).blob() : blobOrDataURL);
  const cv = document.createElement("canvas"); cv.width = bmp.width; cv.height = bmp.height;
  const cx = cv.getContext("2d"); cx.drawImage(bmp, 0, 0);
  const rgba = cx.getImageData(0, 0, bmp.width, bmp.height).data;   // Uint8ClampedArray, w*h*4
  const nameBytes = new TextEncoder().encode(name);
  const total = nameBytes.length + rgba.length;
  const ptr = x.zicroDeckBuffer(total);
  if (!ptr) return false;
  const buf = new Uint8Array(mem.buffer, ptr, total);
  buf.set(nameBytes, 0);
  buf.set(rgba, nameBytes.length);
  return x.zicroAddImage(nameBytes.length, bmp.width, bmp.height) === 0;
}

imgInput.onchange = async () => {
  const f = imgInput.files[0]; imgInput.value = "";
  if (!f) return;
  const ok = await registerImage(f.name, f);
  if (!ok) { edNote("that image could not be decoded", true); return; }
  // keep it for the draft, so a reload can put it back
  const rd = new FileReader();
  rd.onload = () => { edImages[f.name] = rd.result; localStorage.setItem(LS_KEY + "-img", JSON.stringify(edImages)); };
  rd.readAsDataURL(f);
  edModel[edSel].image = f.name;
  edRenderFields();
  edLivePreview();
};
const edNote = (msg, bad) => {
  const n = document.getElementById("ed-note");
  n.textContent = msg || "";
  n.className = bad ? "bad" : "";
};

function edLivePreview() {
  clearTimeout(edPrevT);
  edPrevT = setTimeout(() => {
    const ok = preview(edSel);
    edNote(ok ? "" : "this slide has something the deck cannot parse", !ok);
  }, 140);
}

function edRenderTabs() {
  const t = document.getElementById("ed-tabs");
  t.innerHTML = "";
  edModel.forEach((s, i) => {
    const b = document.createElement("button");
    b.textContent = i + 1;
    if (i === edSel) b.className = "on";
    b.title = s.title || `slide ${i + 1}`;
    b.onclick = () => { edSel = i; edRenderTabs(); edRenderFields(); preview(edSel); };
    t.appendChild(b);
  });
  const add = document.createElement("button");
  add.className = "add"; add.textContent = "+"; add.title = "Add a slide";
  add.onclick = () => {
    const s = blankSlide();
    // a new slide inherits the current view, so it starts looking where you are
    const c = new Float32Array(mem.buffer, x.zicroCamera(), 3);
    s.cam = [c[0], c[1], c[2]];
    edModel.splice(edSel + 1, 0, s);
    edSel += 1;
    edRenderTabs(); edRenderFields(); edLivePreview();
  };
  t.appendChild(add);
}

function field(label, key, opts) {
  const wrap = document.createElement("div");
  const l = document.createElement("label"); l.textContent = label; wrap.appendChild(l);
  const s = edModel[edSel];
  let el;
  if (opts && opts.select) {
    el = document.createElement("select");
    for (const o of opts.select) {
      const op = document.createElement("option"); op.value = o; op.textContent = o;
      if ((s[key] || (key === "edge" ? "all" : opts.select[0])) === o) op.selected = true;
      el.appendChild(op);
    }
    el.onchange = () => { s[key] = el.value; edLivePreview(); if (key === "title") edRenderTabs(); };
  } else if (opts && opts.area) {
    el = document.createElement("textarea");
    el.value = s[key];
    el.oninput = () => { s[key] = el.value; edLivePreview(); };
  } else if (opts && opts.num) {
    el = document.createElement("input"); el.type = "number"; el.value = s[key]; el.step = opts.step || 1;
    el.oninput = () => { s[key] = parseFloat(el.value) || 0; edLivePreview(); };
  } else {
    el = document.createElement("input"); el.type = "text"; el.value = s[key];
    el.placeholder = opts && opts.ph || "";
    el.oninput = () => { s[key] = el.value; edLivePreview(); if (key === "title") edRenderTabs(); };
  }
  wrap.appendChild(el);
  return wrap;
}

function edRenderFields() {
  const b = document.getElementById("ed-body");
  b.innerHTML = "";
  if (!edModel.length) { b.innerHTML = "<p style='color:#93a1ba'>No slides. Press + to add one.</p>"; return; }
  const s = edModel[edSel];
  b.appendChild(field("Title", "title", { ph: "What this slide is about" }));
  b.appendChild(field("Body", "body", { area: true }));
  b.appendChild(field("Citation", "cite", { ph: "optional — a source line" }));
  b.appendChild(field("Preset (view)", "preset", { select: OPTS.presets }));
  const row = document.createElement("div"); row.className = "ed-row";
  row.appendChild(field("Colour", "color", { select: OPTS.colors }));
  row.appendChild(field("Filter", "filter", { select: OPTS.filters }));
  b.appendChild(row);
  b.appendChild(field("Edges", "edge", { select: OPTS.edges }));

  // A picture instead of the scene. The browser decodes it (a tab has no stb_image),
  // registers the RGBA with the wasm under a name, and the slide names that. So an
  // image slide previews here exactly as it renders — no filesystem in sight.
  const imgWrap = document.createElement("div");
  const il = document.createElement("label"); il.textContent = "Picture (instead of the scene)"; imgWrap.appendChild(il);
  const irow = document.createElement("div"); irow.className = "ed-cam";
  const pick = document.createElement("button"); pick.textContent = s.image ? "Replace…" : "Choose image…";
  const iclear = document.createElement("button"); iclear.textContent = "Clear";
  const iname = document.createElement("span"); iname.className = "val"; iname.textContent = s.image || "— the live scene";
  pick.onclick = () => imgInput.click();
  iclear.onclick = () => { s.image = ""; iname.textContent = "— the live scene"; pick.textContent = "Choose image…"; edLivePreview(); };
  irow.append(pick, iclear, iname); imgWrap.appendChild(irow); b.appendChild(imgWrap);

  // camera capture
  const camWrap = document.createElement("div");
  const cl = document.createElement("label"); cl.textContent = "Camera"; camWrap.appendChild(cl);
  const cam = document.createElement("div"); cam.className = "ed-cam";
  const use = document.createElement("button"); use.textContent = "Use current view";
  const clear = document.createElement("button"); clear.textContent = "Clear";
  const val = document.createElement("span"); val.className = "val";
  const showCam = () => { val.textContent = s.cam ? `yaw ${s.cam[0].toFixed(2)} · pitch ${s.cam[1].toFixed(2)} · dist ${s.cam[2].toFixed(1)}` : "— follows the slide"; };
  use.onclick = () => { const c = new Float32Array(mem.buffer, x.zicroCamera(), 3); s.cam = [c[0], c[1], c[2]]; showCam(); edLivePreview(); };
  clear.onclick = () => { s.cam = null; showCam(); edLivePreview(); };
  showCam();
  cam.append(use, clear, val); camWrap.appendChild(cam); b.appendChild(camWrap);

  const row2 = document.createElement("div"); row2.className = "ed-row";
  row2.appendChild(field("Dwell (s)", "dwell", { num: true, step: 1 }));
  b.appendChild(row2);

  const tw = document.createElement("div"); tw.className = "ed-check";
  const cb = document.createElement("input"); cb.type = "checkbox"; cb.id = "ed-tumble"; cb.checked = s.tumble;
  cb.onchange = () => { s.tumble = cb.checked; edLivePreview(); };
  const tl = document.createElement("label"); tl.htmlFor = "ed-tumble"; tl.textContent = "Tumble (auto-rotate)";
  tw.append(cb, tl); b.appendChild(tw);

  // Order and copies — a deck is an argument, and arguments get rearranged.
  const ol = document.createElement("label"); ol.textContent = "This slide"; b.appendChild(ol);
  const ops = document.createElement("div"); ops.className = "ed-cam";
  const refresh = () => { edRenderTabs(); edRenderFields(); edLivePreview(); };
  const mkOp = (label, disabled, fn) => {
    const bt = document.createElement("button");
    bt.textContent = label; bt.disabled = disabled; bt.onclick = fn;
    return bt;
  };
  ops.append(
    mkOp("◂ Move", edSel === 0, () => {
      [edModel[edSel - 1], edModel[edSel]] = [edModel[edSel], edModel[edSel - 1]];
      edSel -= 1; refresh();
    }),
    mkOp("Move ▸", edSel === edModel.length - 1, () => {
      [edModel[edSel + 1], edModel[edSel]] = [edModel[edSel], edModel[edSel + 1]];
      edSel += 1; refresh();
    }),
    mkOp("Duplicate", false, () => {
      edModel.splice(edSel + 1, 0, structuredClone(edModel[edSel]));
      edSel += 1; refresh();
    }),
  );
  b.appendChild(ops);

  const del = document.createElement("button"); del.id = "ed-del"; del.textContent = "Delete this slide";
  del.onclick = () => {
    if (edModel.length <= 1) { edNote("a deck needs at least one slide", true); return; }
    edModel.splice(edSel, 1);
    edSel = Math.max(0, edSel - 1);
    refresh();
  };
  b.appendChild(del);

  // A saved draft shadows the deck the demo ships — forever, if nothing offers the
  // way back. This is the way back.
  if (localStorage.getItem(LS_KEY)) {
    const dd = document.createElement("button"); dd.className = "ed-ghost";
    dd.textContent = "Discard saved draft — back to the built-in deck";
    dd.onclick = () => {
      localStorage.removeItem(LS_KEY);
      localStorage.removeItem(LS_KEY + "-img");
      location.reload();
    };
    b.appendChild(dd);
  }
}

function openEditor() {
  if (!edModel.length) {
    const draft = localStorage.getItem(LS_KEY);
    edModel = parseDeck(draft || strAt(x.zicroDeckZon(), x.zicroDeckZonLen()));
    if (!edModel.length) edModel = [blankSlide()];
  }
  edSel = Math.min(edSel, edModel.length - 1);   // reopen where the author left off
  document.body.classList.add("editing");
  document.getElementById("editor").setAttribute("aria-hidden", "false");
  edRenderTabs(); edRenderFields();
  preview(edSel);
}
function closeEditor() {
  document.body.classList.remove("editing");
  document.getElementById("editor").setAttribute("aria-hidden", "true");
  canvas.focus();
}

function toggleEditor() {
  if (document.body.classList.contains("editing")) closeEditor(); else openEditor();
}
document.getElementById("b-edit").onclick = toggleEditor;
document.getElementById("t-edit").onclick = toggleEditor;
document.getElementById("ed-close").onclick = closeEditor;
document.getElementById("ed-save").onclick = () => {
  const zon = serializeDeck(edModel);
  localStorage.setItem(LS_KEY, zon);                    // survives a reload
  const blob = new Blob([zon], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = `deck-${demo}.zon`;
  a.click(); URL.revokeObjectURL(a.href);
  edNote("saved — deck.zon downloaded, and kept in this browser");
};

// A draft from a previous visit becomes the deck as soon as the demo boots, so the
// author's work is where they left it — but its pictures must be re-registered first,
// because the wasm forgot them on reload; a slide that named one would come up blank.
(async function restoreDraft() {
  const draft = localStorage.getItem(LS_KEY);
  if (!draft) return;
  try {
    const imgs = JSON.parse(localStorage.getItem(LS_KEY + "-img") || "{}");
    for (const [name, url] of Object.entries(imgs)) {
      edImages[name] = url;
      await registerImage(name, url);
    }
  } catch {}
  const bytes = new TextEncoder().encode(draft);
  const ptr = x.zicroDeckBuffer(bytes.length);
  if (!ptr) return;
  new Uint8Array(mem.buffer, ptr, bytes.length).set(bytes);
  if (x.zicroApplyDeck(0) === 0)   // if it fails, the embedded deck stays — no harm
    say("restored your saved draft — the editor can discard it");
})();

// The scene render scale, driven from here. It is SAFE to move only because the
// wasm scales the figure alone and leaves the HUD at full resolution — the earlier
// attempt that shrank the whole canvas ran the status text off the edge. `?q=` pins
// it (q=1 sharp, for a screenshot or a fair A/B); otherwise a governor moves it.
const pinnedQ = parseFloat(params.get("q"));
if (pinnedQ > 0 && x.zicroSceneScale) x.zicroSceneScale(pinnedQ);

// The governor watches the MEDIAN of a short window (a median, so one GC hitch does
// not cost the visitor their sharpness) and steps the scale when the frames are
// clearly on the wrong side of the budget. The window closes on time as well as on
// frame count — at one frame a second, "30 frames" is half a minute of waiting, and
// the page must react to being unusable before the first slide is over.
const BUDGET_MS = 34;   // ~30 fps: below this, motion is worth more than pixels
const COMFORT_MS = 20;  // ~50 fps: room to spare, take a pixel back
let q = pinnedQ > 0 ? pinnedQ : 1;
let qLog = [], qWindowStart = 0, qLastAdjust = 0;
function govern(frameMs) {
  if (pinnedQ > 0 || !x.zicroSceneScale) return;
  const now = performance.now();
  if (!qWindowStart) qWindowStart = now;
  qLog.push(frameMs);
  const ready = qLog.length >= 30 || (now - qWindowStart > 700 && qLog.length >= 4);
  if (!ready) return;
  const med = qLog.slice().sort((a, b) => a - b)[qLog.length >> 1];
  qLog = []; qWindowStart = now;
  if (now - qLastAdjust < 900) return;
  const over = med / BUDGET_MS;
  let next = q;
  if (over > 1) next = Math.max(0.35, q - (over > 2.5 ? 0.3 : 0.15));
  else if (med < COMFORT_MS) next = Math.min(1, q + 0.15);
  if (Math.abs(next - q) < 0.01) return;
  q = next; qLastAdjust = now;
  x.zicroSceneScale(q);
}

function frame(tMs) {
  const t0 = performance.now();     // the work is the wasm frame; the JS blit is ~1 ms
  x.zicroFrame(tMs);
  const w = x.zicroWidth(), h = x.zicroHeight();
  if (w > 0 && h > 0) {
    const bytes = new Uint8ClampedArray(mem.buffer, x.zicroPixels(), w * h * 4);
    ctx.putImageData(new ImageData(bytes, w, h), 0, 0);
  }
  govern(performance.now() - t0);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
