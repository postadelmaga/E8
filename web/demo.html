<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>E8 — an interactive paper</title>
<meta name="description" content="Interactive scientific papers you can steer: the E8 root system, a 24-cell, a molecule, a star catalog." />
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; overscroll-behavior: none; }
  canvas { display: block; width: 100vw; height: 100vh; touch-action: none; outline: none; }
  #err { position: fixed; inset: 0; display: none; place-content: center; color: #f78; font: 14px monospace; padding: 2rem; white-space: pre-wrap; }
  #load { position: fixed; inset: 0; display: grid; place-content: center; color: #8fa3c4; font: 15px system-ui, sans-serif; }

  /* The way in, for someone who arrived from a link: it goes on the first
     interaction, because after that the guide strip the app draws says it all. */
  #hint {
    position: fixed; left: 50%; bottom: calc(20px + env(safe-area-inset-bottom)); transform: translateX(-50%);
    color: #c6d0e0; background: rgba(10,12,20,.66); border: 1px solid rgba(120,140,180,.28);
    border-radius: 16px; padding: 9px 18px; font: 14px/1.4 system-ui, sans-serif;
    pointer-events: none; transition: opacity .6s ease; z-index: 3; text-align: center; max-width: 88vw;
  }
  #hint b { color: #f0e2aa; font-weight: 600; }

  /* The bar exists only where there is no keyboard. Every key the demo needs — the
     journey, the shortcuts, fullscreen — is a key, and a phone has none of them; a
     touch user without this bar can orbit the figure and nothing else. */
  #touchbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 4; display: none;
    justify-content: center; gap: 8px; padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(0,0,0,.72), rgba(0,0,0,0));
  }
  #touchbar button {
    flex: 0 0 auto; min-width: 52px; min-height: 44px;   /* 44px: the smallest target a thumb hits reliably */
    color: #dbe6f7; background: rgba(22,26,38,.86); border: 1px solid rgba(120,140,180,.30);
    border-radius: 12px; font: 15px/1 system-ui, sans-serif; padding: 0 14px;
  }
  #touchbar button:active { background: rgba(60,70,96,.9); }
  #touchbar .wide { font-weight: 600; color: #f0e2aa; }
  body.touch #touchbar { display: flex; }
  body.touch #hint { bottom: calc(74px + env(safe-area-inset-bottom)); }

  /* Home, and the sources. Quiet, in the corner, out of the figure's way. */
  #top {
    position: fixed; left: 14px; right: 14px; top: calc(10px + env(safe-area-inset-top)); z-index: 3;
    display: flex; justify-content: space-between; align-items: center; pointer-events: none;
    font: 13px/1.5 system-ui, sans-serif; color: #8792a6;
  }
  #top a { pointer-events: auto; color: #9fb4d8; text-decoration: none; border-bottom: 1px solid rgba(159,180,216,.28); }
  #top a:hover { color: #dbe6f7; border-bottom-color: #dbe6f7; }
  #top .home { border: 1px solid rgba(120,140,180,.30); border-bottom-color: rgba(120,140,180,.30);
               background: rgba(10,12,20,.6); border-radius: 10px; padding: 7px 12px; }
  #src { display: flex; gap: 14px; align-items: center; }

  /* The drop target only appears while something is over the page — a dashed rectangle
     sitting there permanently would be furniture in front of the figure. */
  #drop {
    position: fixed; inset: 12px; z-index: 6; display: none; place-content: center;
    border: 2px dashed rgba(160,190,240,.65); border-radius: 18px;
    background: rgba(8,12,22,.72); color: #dbe6f7; font: 17px system-ui, sans-serif;
  }
  body.dragging #drop { display: grid; }
  #toast {
    position: fixed; left: 50%; top: calc(58px + env(safe-area-inset-top)); transform: translateX(-50%);
    z-index: 6; display: none; max-width: 90vw; padding: 10px 16px; border-radius: 12px;
    font: 14px/1.45 system-ui, sans-serif; text-align: center;
    background: rgba(12,16,26,.92); border: 1px solid rgba(120,140,180,.35); color: #dbe6f7;
  }
  #toast.bad { border-color: rgba(240,120,120,.5); color: #ffc4c4; }
  #toast.show { display: block; }
  #b-open { display: none; }
  body.opens #b-open { display: block; }
  @media (max-width: 640px) { #src { display: none; } }   /* a phone has no room for footnotes */
</style>
</head>
<body>
<canvas id="c" tabindex="0"></canvas>
<div id="top">
  <a class="home" href="./">‹ All demos</a>
  <span id="src">
    <a href="https://github.com/postadelmaga/E8" target="_blank" rel="noopener">E8</a>
    <a href="https://github.com/postadelmaga/Zengine" target="_blank" rel="noopener">Zengine</a>
    <a href="https://github.com/postadelmaga/Zrame" target="_blank" rel="noopener">Zrame</a>
  </span>
</div>
<div id="load">loading…</div>
<div id="hint"></div>
<div id="touchbar">
  <button id="b-prev" aria-label="Previous slide">‹</button>
  <button id="b-next" class="wide" aria-label="Next slide">Next ›</button>
  <button id="b-open" aria-label="Open a file">Open…</button>
  <button id="b-help" aria-label="Shortcuts">?</button>
  <button id="b-full" aria-label="Fullscreen">⤢</button>
</div>
<div id="err"></div>
<div id="drop">Drop it — this demo will read it</div>
<div id="toast"></div>
<input id="file" type="file" hidden />

<script type="module">
// The interactive paper, in a tab. The wasm module IS the app — the same domain,
// plugins and software rasterizer the native build runs (src/web.zig). This harness
// instantiates ONE demo (the domain is a comptime seam: one module per demo), drives
// rAF, blits the RGBA buffer, and turns DOM events into the ABI the app already has.
const DEMOS = ["lisi","mtheory","polytope","molecule","chem","astro","graph","data","embed"];
// The five profiles open a file you bring. They ship a real sample so the page is never
// empty (src/demos/SAMPLES.md) — but the sample is the invitation, not the point.
const OPENS = {
  chem:  { accept: ".pdb,.ent,.xyz",             what: "a structure (PDB or XYZ)" },
  astro: { accept: ".csv,.tsv,.txt",             what: "a star catalog (CSV: ra, dec, dist or parallax…)" },
  graph: { accept: ".csv,.txt,.edges,.graphml",  what: "an edge list or GraphML" },
  data:  { accept: ".csv,.tsv,.txt",             what: "any CSV" },
  embed: { accept: ".csv,.tsv,.npy",             what: "vectors (CSV or .npy)" },
};
const params = new URLSearchParams(location.search);
const asked = params.get("d");
// A demo we do not carry must SAY so. Falling back to the default silently is how the
// star catalog came up as E8 — the worst possible answer, because it looks like one.
if (asked && !DEMOS.includes(asked)) {
  document.getElementById("load").style.display = "none";
  document.getElementById("err").style.display = "grid";
  document.getElementById("err").textContent =
    `"${asked}" is not in the browser yet — it is a profile that opens a file you bring, and this page cannot hand it one. Go back and pick another.`;
  throw new Error("demo not on the web: " + asked);
}
const demo = asked || "lisi";

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d", { alpha: false });
const errEl = document.getElementById("err");
const loadEl = document.getElementById("load");
const hint = document.getElementById("hint");
const fail = (m) => { loadEl.style.display = "none"; errEl.style.display = "grid"; errEl.textContent = "E8 web error:\n" + m; };

// A finger is not a mouse: no hover, no keyboard, and a screen a third the size.
const TOUCH = matchMedia("(pointer: coarse)").matches;
document.body.classList.toggle("touch", TOUCH);
hint.innerHTML = TOUCH
  ? "<b>Tap</b> to turn the page · drag to orbit · pinch to zoom · tap a point to inspect it"
  : "Press <b>P</b> to start the paper · <b>H</b> for every key · drag to orbit, click a point";

let x, mem;
try {
  const { instance } = await WebAssembly.instantiateStreaming(fetch(`wasm/e8-${demo}.wasm`), { env: {} });
  x = instance.exports; mem = x.memory;
  x.zicroBoot();
  loadEl.style.display = "none";
} catch (e) { fail(String(e)); throw e; }

// --- the frame buffer -------------------------------------------------------------
// The figure is rasterized on the CPU, so every physical pixel is one this thread
// paints. A phone reporting devicePixelRatio 3 would ask for ~7 M of them per frame
// and get a slideshow; capping the ratio costs a little sharpness and buys the
// interaction back. Desktops, which have the cores to spare, keep 2.
const DPR_MAX = TOUCH ? 1.5 : 2;
let dpr = 1;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, DPR_MAX);
  const cssW = Math.max(1, window.innerWidth | 0), cssH = Math.max(1, window.innerHeight | 0);
  x.zicroResize(Math.round(cssW * dpr), Math.round(cssH * dpr), dpr);
  canvas.width = x.zicroWidth();
  canvas.height = x.zicroHeight();
}
addEventListener("resize", resize);
addEventListener("orientationchange", () => setTimeout(resize, 120));
resize();
canvas.focus();

let touched = false;
const used = () => { if (!touched) { touched = true; hint.style.opacity = "0"; } };

// --- keys (evdev codes: the table the native build binds, src/keys.zig) -----------
const EVDEV = {
  KeyA:30,KeyB:48,KeyC:46,KeyD:32,KeyE:18,KeyF:33,KeyG:34,KeyH:35,KeyI:23,KeyJ:36,KeyK:37,KeyL:38,KeyM:50,
  KeyN:49,KeyO:24,KeyP:25,KeyQ:16,KeyR:19,KeyS:31,KeyT:20,KeyU:22,KeyV:47,KeyW:17,KeyX:45,KeyY:21,KeyZ:44,
  Digit1:2,Digit2:3,Digit3:4,Digit4:5,Digit5:6,Digit6:7,Digit7:8,Digit8:9,Digit9:10,Digit0:11,
  Space:57,Minus:12,Equal:13,Comma:51,Period:52,Slash:53,Semicolon:39,Quote:40,
  BracketLeft:26,BracketRight:27,Backslash:43,Backquote:41,
  Backspace:14,Tab:15,Enter:28,Escape:1,Delete:111,Home:102,End:107,
  ArrowLeft:105,ArrowRight:106,ArrowUp:103,ArrowDown:108,
  ShiftLeft:42,ShiftRight:54,
};
const KEY = { next: 25 /*P*/, prev: 14 /*Backspace*/, help: 35 /*H*/, full: 33 /*F*/ };
const press = (code) => { used(); x.zicroKey(code, 1); x.zicroKey(code, 0); };

canvas.addEventListener("keydown", (e) => {
  const code = EVDEV[e.code];
  if (code === undefined) return;
  if (e.code !== "F5" && e.code !== "F12") e.preventDefault();
  used();
  x.zicroKey(code, 1);
});
canvas.addEventListener("keyup", (e) => {
  const code = EVDEV[e.code];
  if (code !== undefined) x.zicroKey(code, 0);
});

// --- pointer and gesture ----------------------------------------------------------
// One code path for mouse, pen and finger — that is what pointer events are for. What
// differs is what the gestures MEAN, and only two are ambiguous:
//
//   · a tap. On a phone it is the page-turn (there is no P key to press) — but a tap
//     ON a point must still inspect it. The browser cannot tell those apart: it knows
//     where the finger landed, not what is under it. So it forwards the tap to the app
//     (zicroTap), which picks first and turns the page only if nothing was hit.
//   · two fingers. A pinch is a zoom, and must not be mistaken for two drags.
const pts = new Map();              // live pointers, by id
let pinchDist = 0;
let down = null;                    // {x, y, t, moved} for the single-pointer gesture

const pos = (e) => { const r = canvas.getBoundingClientRect(); return [(e.clientX - r.left) * dpr, (e.clientY - r.top) * dpr]; };
const dist = () => {
  const [a, b] = [...pts.values()];
  return Math.hypot(a[0] - b[0], a[1] - b[1]);
};

canvas.addEventListener("pointerdown", (e) => {
  used(); canvas.setPointerCapture(e.pointerId); canvas.focus();
  const p = pos(e);
  pts.set(e.pointerId, p);
  if (pts.size === 2) {                    // a second finger ends the drag and starts a pinch
    pinchDist = dist();
    x.zicroPointerButton(272, 0);
    down = null;
    return;
  }
  down = { x: p[0], y: p[1], t: performance.now(), moved: 0 };
  x.zicroPointerMove(p[0], p[1]);
  x.zicroPointerButton(272, 1);            // BTN_LEFT: the app orbits while it is held
});

canvas.addEventListener("pointermove", (e) => {
  const p = pos(e);
  const prev = pts.get(e.pointerId);
  if (prev) pts.set(e.pointerId, p);

  if (pts.size === 2) {
    const d = dist();
    if (pinchDist > 0 && Math.abs(d - pinchDist) > 1) {
      // Pinch → the same wheel the app already understands. The sign matches a
      // trackpad: fingers apart = closer to the figure.
      x.zicroScroll((d - pinchDist) * 3);
      pinchDist = d;
    }
    return;
  }
  if (down) down.moved += Math.abs(p[0] - down.x) + Math.abs(p[1] - down.y);
  x.zicroPointerMove(p[0], p[1]);
});

function endPointer(e) {
  const p = pos(e);
  pts.delete(e.pointerId);
  if (pts.size < 2) pinchDist = 0;

  if (down) {
    const dt = performance.now() - down.t;
    const dx = p[0] - down.x, dy = p[1] - down.y;
    const travel = Math.hypot(dx, dy);
    const tap = travel < 10 * dpr && dt < 350;
    const swipe = TOUCH && dt < 500 && Math.abs(dx) > 60 * dpr && Math.abs(dx) > 2 * Math.abs(dy);

    x.zicroPointerMove(p[0], p[1]);
    x.zicroPointerButton(272, 0);          // release first: the orbit ends here either way

    if (swipe) press(dx < 0 ? KEY.next : KEY.prev);   // the page-turn everyone tries first
    else if (tap && TOUCH) x.zicroTap(p[0], p[1]);    // a point, or the page
    down = null;
    return;
  }
  x.zicroPointerButton(272, 0);
}
canvas.addEventListener("pointerup", endPointer);
canvas.addEventListener("pointercancel", endPointer);

canvas.addEventListener("wheel", (e) => { e.preventDefault(); used(); x.zicroScroll(-e.deltaY * dpr); }, { passive: false });
canvas.addEventListener("contextmenu", (e) => e.preventDefault());
canvas.addEventListener("dblclick", (e) => e.preventDefault());

document.getElementById("b-next").onclick = () => press(KEY.next);
document.getElementById("b-prev").onclick = () => press(KEY.prev);
document.getElementById("b-help").onclick = () => press(KEY.help);
document.getElementById("b-full").onclick = () => {
  // The app's own F toggles a Wayland fullscreen it does not have here; in a tab the
  // page owns the screen, so the page asks for it.
  if (document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen?.().catch(() => {});
};

// --- the file the visitor brings ---------------------------------------------------
// Same path for a drop (desktop) and a pick (phone): read the bytes, hand them to the
// wasm, and let the APP decide whether they are a structure. If they are not, it puts
// the sample back and says so — a viewer that silently shows something else is worse
// than one that says no.
const opens = OPENS[demo];
if (opens) {
  document.body.classList.add("opens");
  document.getElementById("file").accept = opens.accept;
  document.getElementById("drop").textContent = `Drop ${opens.what}`;
}

const toast = document.getElementById("toast");
let toastT = 0;
function say(msg, bad) {
  toast.textContent = msg;
  toast.className = "show" + (bad ? " bad" : "");
  clearTimeout(toastT);
  toastT = setTimeout(() => { toast.className = ""; }, 4200);
}

// The name and the bytes each need a buffer, and one call lends one buffer — so the name
// goes over FIRST, into that scratch, and the module copies it into a home of its own
// before the next call hands the scratch to the file itself.
async function openFile(file) {
  const bytes = new Uint8Array(await file.arrayBuffer());
  const nameBytes = new TextEncoder().encode(file.name);

  const nptr = x.zicroFileBuffer(nameBytes.length);
  if (!nptr) { say("out of memory", true); return; }
  new Uint8Array(mem.buffer, nptr, nameBytes.length).set(nameBytes);
  x.zicroFileName(nptr, nameBytes.length);

  const ptr = x.zicroFileBuffer(bytes.length);            // this frees the name scratch
  if (!ptr) { say("that file is too big for this tab", true); return; }
  new Uint8Array(mem.buffer, ptr, bytes.length).set(bytes);

  const bad = x.zicroOpenFile();
  if (bad) say(`${file.name} would not load — the sample is back`, true);
  else say(`opened ${file.name}`);
  used();
}

if (opens) {
  const fileEl = document.getElementById("file");
  document.getElementById("b-open").onclick = () => fileEl.click();
  fileEl.onchange = () => { if (fileEl.files[0]) openFile(fileEl.files[0]); fileEl.value = ""; };

  addEventListener("dragover", (e) => { e.preventDefault(); document.body.classList.add("dragging"); });
  addEventListener("dragleave", (e) => { if (e.relatedTarget === null) document.body.classList.remove("dragging"); });
  addEventListener("drop", (e) => {
    e.preventDefault();
    document.body.classList.remove("dragging");
    const f = e.dataTransfer?.files?.[0];
    if (f) openFile(f);
  });
}

function frame(tMs) {
  x.zicroFrame(tMs);
  const w = x.zicroWidth(), h = x.zicroHeight();
  if (w > 0 && h > 0) {
    const bytes = new Uint8ClampedArray(mem.buffer, x.zicroPixels(), w * h * 4);
    ctx.putImageData(new ImageData(bytes, w, h), 0, 0);
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>

<!-- Umami (same-origin, cookieless): which paper was opened, and from where. The URL
     carries ?d=<demo>, so the per-demo counts come for free. -->
<script defer src="/stats/script.js"
        data-website-id="ef83c292-ef77-4a08-8f26-ea1b0247cb56"
        data-host-url="https://e8-zdemo.duckdns.org/stats"></script>
</body>
</html>
