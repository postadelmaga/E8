<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>E8 on the GPU — an interactive paper</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2307080c'/%3E%3Ccircle cx='16' cy='16' r='2.6' fill='%23f0e2aa'/%3E%3C/svg%3E" />
<style>
  html, body { margin:0; height:100%; background:#000; overflow:hidden; overscroll-behavior:none; }
  canvas { display:block; width:100vw; height:100vh; touch-action:none; outline:none; }
  #hud { position:fixed; left:14px; top:12px; z-index:2; pointer-events:none;
         font:13px/1.5 ui-monospace, monospace; color:#c6d0e0; text-shadow:0 1px 3px #000; }
  #fps { color:#78e6a0; font-weight:600; }
  #hint { position:fixed; left:50%; bottom:22px; transform:translateX(-50%); z-index:2;
          color:#c6d0e0; background:rgba(10,12,20,.66); border:1px solid rgba(120,140,180,.28);
          border-radius:16px; padding:9px 18px; font:14px/1.4 system-ui, sans-serif;
          pointer-events:none; transition:opacity .6s ease; }
  #boot { position:fixed; inset:0; display:grid; place-content:center; z-index:3;
          color:#8fa3c4; font:15px/1.6 system-ui, sans-serif; text-align:center; padding:2rem;
          background:#000; }
  #boot.bad { color:#ff9d9d; }
  #boot a { color:#9fb4d8; }
  #top { position:fixed; right:14px; top:12px; z-index:2; font:13px system-ui, sans-serif; }
  #top a { color:#9fb4d8; text-decoration:none; border:1px solid rgba(120,140,180,.3);
           background:rgba(10,12,20,.6); border-radius:10px; padding:7px 12px; }
</style>
</head>
<body>
<canvas id="e8"></canvas>
<div id="hud"><span id="fps">—</span> · 240 roots + 6720 edges · 2 instanced draws · WebGPU</div>
<div id="top"><a href="../">‹ All demos</a></div>
<div id="hint">drag to orbit · scroll to zoom</div>
<div id="boot">starting the GPU…</div>

<script>
// The page owns the loop's host: emscripten calls _ze_boot, the wasm sets its own
// main loop, and everything below only feeds it the canvas size and the mouse.
const boot = document.getElementById("boot");
const cv = document.getElementById("e8");
const hint = document.getElementById("hint");

// WebGPU or nothing: the instanced mesh path has no WebGL2 twin yet (Zengine #88).
if (!navigator.gpu) {
  boot.className = "bad";
  boot.innerHTML = "This browser has no <b>WebGPU</b>.<br><br>" +
    "The GPU path needs it — the instanced mesh seam has no WebGL2 fallback yet.<br>" +
    "On Linux Chrome: <code>chrome://flags/#enable-unsafe-webgpu</code> + <code>#enable-vulkan</code>.<br><br>" +
    "<a href='../demo.html?d=lisi'>Open the software build instead →</a>";
  throw new Error("no WebGPU");
}

var Module = {
  onRuntimeInitialized() {
    resize();
    Module._ze_boot();
    // _ze_boot is async underneath (adapter → device): poll for the error string
    // rather than assume it came up.
    let tries = 0;
    const check = () => {
      const e = Module.UTF8ToString(Module._ze_error());
      if (e) { boot.className = "bad"; boot.textContent = e; return; }
      if (Module._ze_frames() > 0) { boot.style.display = "none"; return; }
      if (++tries > 200) { boot.className = "bad"; boot.textContent = "the GPU never drew a frame"; return; }
      setTimeout(check, 50);
    };
    check();
  },
};

function resize() {
  // Cap the ratio: this is the GPU's pixel count, and a phone at dpr 3 is asking for
  // four times the fill for a difference it cannot show.
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.round(window.innerWidth * dpr), h = Math.round(window.innerHeight * dpr);
  cv.width = w; cv.height = h;
  if (Module._ze_resize) Module._ze_resize(w, h);
}
addEventListener("resize", resize);

// --- orbit ---------------------------------------------------------------------------
let down = false, lx = 0, ly = 0;
const used = () => { hint.style.opacity = "0"; };
cv.addEventListener("pointerdown", (e) => { down = true; lx = e.clientX; ly = e.clientY; cv.setPointerCapture(e.pointerId); used(); });
cv.addEventListener("pointerup", () => { down = false; });
cv.addEventListener("pointercancel", () => { down = false; });
cv.addEventListener("pointermove", (e) => {
  if (!down || !Module._ze_look) return;
  Module._ze_look((e.clientX - lx) * 0.008, (e.clientY - ly) * 0.008);
  lx = e.clientX; ly = e.clientY;
});
cv.addEventListener("wheel", (e) => {
  e.preventDefault(); used();
  if (Module._ze_dolly) Module._ze_dolly(e.deltaY * 0.0012);
}, { passive: false });

setInterval(() => {
  if (!Module._ze_ms) return;
  const ms = Module._ze_ms();
  document.getElementById("fps").textContent = ms > 0.01 ? (1000 / ms).toFixed(0) + " FPS" : "—";
}, 500);
</script>
<script src="e8gpu.js"></script>
</body>
</html>
